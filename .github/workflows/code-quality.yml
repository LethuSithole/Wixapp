name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Check code formatting (if prettier is added)
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}" "server/**/*.js" || echo "Prettier not configured - skipping"

      - name: Run ESLint (if configured)
        run: npx eslint "src/**/*.{ts,tsx,js,jsx}" "server/**/*.js" || echo "ESLint not configured - skipping"
