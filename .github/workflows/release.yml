name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Create release archive
      run: |
        tar -czf wix-hubspot-integration-${{ github.ref_name }}.tar.gz \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=dist \
          --exclude=.env \
          .

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## What's Changed

          ### 🚀 Features
          - [List major features]

          ### 🐛 Bug Fixes
          - [List bug fixes]

          ### 📚 Documentation
          - [List documentation updates]

          ### 🔧 Maintenance
          - [List maintenance changes]

          ## Installation

          ```bash
          npm install
          npm run build
          npm run dev:server
          ```

          ## Deployment

          See [DEPLOYMENT.md](./DEPLOYMENT.md) for detailed deployment instructions.

        draft: false
        prerelease: false

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./wix-hubspot-integration-${{ github.ref_name }}.tar.gz
        asset_name: wix-hubspot-integration-${{ github.ref_name }}.tar.gz
        asset_content_type: application/gzip